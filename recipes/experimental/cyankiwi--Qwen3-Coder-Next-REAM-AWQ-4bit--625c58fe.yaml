recipe_version: "1"
name: Qwen3-Coder-Next-REAM-AWQ-4bit
description: vLLM recipe for Qwen3-Coder-Next-REAM-AWQ-4bit
model: cyankiwi/Qwen3-Coder-Next-REAM-AWQ-4bit
runtime: vllm
container: vllm-node
solo_only: true
cluster_only: false
mods:
  - mods/fix-qwen3-coder-next
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: auto
  max_num_batched_tokens: 8192
env: {}
command: |
  vllm serve cyankiwi/Qwen3-Coder-Next-REAM-AWQ-4bit \
      --load-format fastsafetensors \
      --enable-prefix-caching \
      --enable-auto-tool-choice \
      --kv-cache-dtype fp8 \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --port {port} \
      --host {host} \
      --max-model-len auto \
      --max-num-batched-tokens {max_num_batched_tokens} \
      --tool-call-parser qwen3_coder \
      --attention-backend flashinfer \
      -tp {tensor_parallel}
