recipe_version: "1"
name: MiniMax-M2.5-REAP-139B-A10B-NVFP4-GB10
description: vLLM recipe for MiniMax-M2.5-REAP-139B-A10B-NVFP4-GB10
model: saricles/MiniMax-M2.5-REAP-139B-A10B-NVFP4-GB10
runtime: vllm
container: vllm-node
solo_only: true
cluster_only: false
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: auto
  max_num_batched_tokens: 8192
env: {}
command: |
  vllm serve saricles/MiniMax-M2.5-REAP-139B-A10B-NVFP4-GB10 \
      --load-format fastsafetensors \
      --enable-prefix-caching \
      --enable-auto-tool-choice \
      --kv-cache-dtype fp8 \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --port {port} \
      --host {host} \
      --max-model-len auto \
      --max-num-batched-tokens {max_num_batched_tokens} \
      --trust-remote-code \
      -tp {tensor_parallel}
