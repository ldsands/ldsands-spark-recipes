recipe_version: "1"
name: Qwen3.5-27B-Writer
description: vLLM recipe for Qwen3.5-27B-Writer
model: ConicCat/Qwen3.5-27B-Writer
runtime: eugr-vllm
container: vllm-node
solo_only: true
cluster_only: false
mods:
  - mods/fix-qwen3.5-chat-template
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.80
  max_model_len: auto
  max_num_batched_tokens: 8192
env: {}
command: |
  vllm serve ConicCat/Qwen3.5-27B-Writer \
      --load-format fastsafetensors \
      --enable-prefix-caching \
      --enable-auto-tool-choice \
      --kv-cache-dtype fp8 \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --port {port} \
      --host {host} \
      --max-model-len auto \
      --max-num-batched-tokens {max_num_batched_tokens} \
      --tool-call-parser qwen3_coder \
      --reasoning-parser qwen3 \
      --chat-template unsloth.jinja \
      --trust-remote-code \
      -tp {tensor_parallel}
