model: chankhavu/Nemotron-Cascade-2-30B-A3B-NVFP4
container: vllm-node
mods:
  - mods/nemotron-nano
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.84
  max_model_len: 262144
env: {}
command: |
  vllm serve chankhavu/Nemotron-Cascade-2-30B-A3B-NVFP4 \
      --mamba_ssm_cache_dtype float32 \
      --moe-backend cutlass \
      --max-model-len {max_model_len} \
      --port {port} --host {host} \
      --trust-remote-code \
      --enable-auto-tool-choice  \
      --tool-call-parser qwen3_coder \
      --reasoning-parser nemotron_v3  \
      --kv-cache-dtype fp8  \
      --enable-prefix-caching  \
      --load-format fastsafetensors  \
      --gpu-memory-utilization {gpu_memory_utilization}
runtime: vllm
metadata:
  model_dtype: nvfp4
  num_layers: 52
  num_kv_heads: 2
  head_dim: 128
  model_params: '38679563264'
  quantization: nvfp4
  quant_bits: 4
  kv_dtype: fp8
  description: vLLM serving Cascade-2-30B-A3B-NVFP4 on a SINGLE NODE ONLY!
recipe_version: '1'
name: Cascade-2-30B-A3B-NVFP4
builder: eugr
max_nodes: 1
solo_only: true